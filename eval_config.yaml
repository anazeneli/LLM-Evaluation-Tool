# Eval configuration — edit this file, then run: python submit_jobs.py
#
# Each (model, prompt) combination becomes one Lightning Batch Job.
# Jobs run on the machine specified below, independent of this Studio's machine.
#
# To test the pipeline before a full run:
#   python submit_jobs.py --dry-run        # preview jobs without submitting
#   python run_job.py --model-dir <path> --model-name test --dataset data/sample_prompts.jsonl --limit 5

experiment:
  name: my-eval-run
  # Replace with your real prompt dataset for production runs (100k+ rows supported)
  dataset: data/sample_prompts.jsonl

job:
  machine: T4           # L4 | A100 | H100 | A100_80GB — see README for model size guidance
  interruptible: false  # true = spot instances (cheaper, but can be preempted)
  max_model_len: 2048

models:
  # Add one entry per fine-tuned checkpoint to evaluate.
  # path = local filesystem path or HuggingFace model ID — passed directly to vLLM.
  # To evaluate your own fine-tuned checkpoint, point path at where your training job saved weights:
  #   e.g. /teamspace/jobs/<your-training-job>/snapshot/outputs/checkpoint
  - name: baseline
    path: org/teamspace/gemma-3-270m-it
    arch: gemma-3-270m-it    # dashboard grouping dimension — group runs by arch to compare the same model family

  # - name: finetune_v1
  #   path: /teamspace/studios/this_studio/checkpoints/gemma-3-270m-it-ft
  #   arch: gemma-3-270m-it

prompts:
  # Add one entry per system prompt variant to test.
  # Each prompt runs against every model above.
  - name: default
    system: |
      You are a helpful assistant. Answer clearly and concisely.

  # - name: structured
  #   system: |
  #     Reply in JSON only. No explanation.
