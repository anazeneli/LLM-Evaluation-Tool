# Eval configuration — edit this file, then run: python submit_jobs.py
#
# Each (model × prompt) combination becomes one Lightning Batch Job running on its own GPU.
# Steps:
#   1. Upload your model weights:  python download_model.py --model-id unsloth/gemma-3-270m-it --litmodels-name org/teamspace/model-name
#   2. Set models[*].path below to the litmodels name you used above
#   3. python submit_jobs.py --dry-run   # preview
#   4. python submit_jobs.py --limit 5   # smoke test on L4 (5 prompts)
#   5. python submit_jobs.py             # full run

experiment:
  name: my-eval-run     # groups all jobs in this config into one LitLogger experiment
  dataset: data/sample_prompts.jsonl   # replace with your dataset for production runs

job:
  machine: L4           # minimum for Gemma3 — T4 lacks shared memory for Triton kernels
                        # larger datasets: upgrade to A100 or H100 for more throughput
  interruptible: false  # true = spot instances (cheaper, may be preempted)
  max_model_len: 2048

models:
  # Add one entry per checkpoint to evaluate.
  # path formats:
  #   litmodels ref  — org/teamspace/model-name      (shared registry, downloaded at job start)
  #   teamspace path — /teamspace/studios/<s>/path   (direct filesystem access)
  - name: baseline
    path: org/teamspace/model-name   # replace with your litmodels path (see step 1 above)
    arch: gemma-3-270m-it            # used for grouping in LitLogger dashboard

  # Add more models to compare them side by side in the same experiment:
  # - name: finetune_v1
  #   path: org/teamspace/my-finetuned-model
  #   arch: gemma-3-270m-it

prompts:
  # Add one entry per system prompt variant to test.
  # Each prompt runs against every model above.
  - name: default
    system: |
      You are a helpful assistant. Answer clearly and concisely.

  # - name: structured
  #   system: |
  #     Reply in JSON only. No explanation.
